<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModPanel - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/colors.css" />
    <link rel="stylesheet" href="/global.css" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Players</h2>
        <button id="refresh-btn" class="refresh-icon-btn" title="Refresh Now">
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>
      <div class="players-spacer"></div>
      <div id="player-list" class="player-list">
        <!-- Players will be loaded here -->
      </div>
    </div>
    <div class="main-content">
      <h1>Welcome to ModPanel</h1>
      <p>This is the main content area.</p>

      <footer class="footer">
        <div class="footer-links">
          <a
            href="https://github.com/lighscent/ModPanel"
            class="footer-link"
            target="_blank"
          >
            <i class="fab fa-github"></i>GitHub
          </a>
          <a
            href="https://github.com/lighscent/ModPanel/blob/alpha/LICENSE"
            class="footer-link"
            target="_blank"
          >
            <i class="fas fa-file-contract"></i>License
          </a>
          <a
            href="https://discord.gg/YmA88jc7GF"
            class="footer-link"
            target="_blank"
          >
            <i class="fab fa-discord"></i>Discord
          </a>
          <a
            href="https://modrinth.com/plugin/modpanel"
            class="footer-link"
            target="_blank"
          >
            <i class="fas fa-cube"></i>Modrinth
          </a>
          <div id="version-status" class="footer-version" style="display: none">
            <span id="version-info">
              <i class="fas fa-spinner fa-spin"></i>
            </span>
          </div>
        </div>
      </footer>
    </div>

    <script>
      async function loadPlayers() {
        try {
          const response = await fetch("/api/players");
          const players = await response.json();
          const playerList = document.getElementById("player-list");

          // Clear existing list
          playerList.innerHTML = "";

          const onlinePlayers = players.filter((p) => p.online);
          const offlinePlayers = players.filter((p) => !p.online);

          if (onlinePlayers.length > 0) {
            const onlineHeader = document.createElement("div");
            onlineHeader.className = "list-header";
            onlineHeader.innerHTML = `<i class="fas fa-circle online"></i> Online Players (${onlinePlayers.length})`;
            playerList.appendChild(onlineHeader);

            onlinePlayers.forEach((player) =>
              playerList.appendChild(createPlayerElement(player)),
            );
          }

          if (offlinePlayers.length > 0) {
            const offlineHeader = document.createElement("div");
            offlineHeader.className = "list-header";
            offlineHeader.innerHTML = `<i class="fas fa-circle-notch"></i> Offline Players`;
            playerList.appendChild(offlineHeader);

            offlinePlayers.forEach((player) =>
              playerList.appendChild(createPlayerElement(player)),
            );
          }
        } catch (error) {
          console.error("Failed to load players:", error);
          const playerList = document.getElementById("player-list");
          playerList.innerHTML =
            '<li class="player-item">Failed to load players</li>';
        }
      }

      function createPlayerElement(player) {
        const li = document.createElement("li");
        li.className = `player-item ${
          player.online ? "player-online" : "player-offline"
        }`;
        li.style.cursor = "pointer";
        li.onclick = function () {
          window.location.href = `/profile?uuid=${player.uuid}`;
        };

        // Player head
        const headDiv = document.createElement("div");
        headDiv.className = "player-head";
        const headImg = document.createElement("img");
        headImg.src = `https://cravatar.eu/avatar/${player.uuid}/32.png`;
        headImg.alt = `${player.name}'s head`;
        headImg.style.width = "32px";
        headImg.style.height = "32px";
        headImg.style.borderRadius = "3px";
        headImg.onerror = function () {
          // Fallback to default head if image fails to load
          headDiv.innerHTML = '<i class="fas fa-user"></i>';
        };
        headDiv.appendChild(headImg);

        const nameSpan = document.createElement("span");
        nameSpan.className = "player-name";
        nameSpan.textContent = player.name;

        const statusSpan = document.createElement("span");
        statusSpan.className = `player-status ${
          player.online ? "online" : "offline"
        }`;
        statusSpan.textContent = player.online ? "Online" : "Offline";

        li.appendChild(headDiv);
        li.appendChild(nameSpan);
        li.appendChild(statusSpan);
        return li;
      }

      // Load players when page loads
      window.addEventListener("load", () => {
        loadPlayers();
        checkVersion();
      });

      async function checkVersion() {
        const versionContainer = document.getElementById("version-status");
        const versionInfo = document.getElementById("version-info");

        try {
          const response = await fetch("/api/version");
          const data = await response.json();

          if (data.updateAvailable) {
            versionContainer.style.display = "inline-flex";
            if (data.securityUpdate) {
              versionInfo.innerHTML = `
                <a href="https://modrinth.com/plugin/modpanel" target="_blank" class="footer-link version-security" title="Critical Security Update Available!">
                  <i class="fas fa-shield-alt"></i>SECURITY UPDATE (${data.latest})
                </a>
            `;
              showSecurityModal(data.latest);
            } else {
              versionInfo.innerHTML = `
                <a href="https://modrinth.com/plugin/modpanel" target="_blank" class="footer-link version-update">
                  <i class="fas fa-exclamation-circle"></i>Update Available (${data.latest})
                </a>
            `;
            }
          } else {
            versionContainer.style.display = "inline-flex";
            versionInfo.innerHTML = `
                <span class="footer-link version-latest">
                  <i class="fas fa-check-circle"></i>${data.current}
                </span>
            `;
          }
        } catch (error) {
          console.error("Failed to check version:", error);
          versionContainer.style.display = "none";
        }
      }

      // Manual refresh button
      document.getElementById("refresh-btn").addEventListener("click", () => {
        loadPlayers();
      });

      // Event listener for live updates
      const eventSource = new EventSource("/api/events");
      eventSource.onmessage = function (event) {
        if (event.data === "refresh") {
          loadPlayers();
        }
      };

      function showSecurityModal(version) {
        // Prevent duplicate modals
        if (document.getElementById("security-modal")) return;

        const modalHtml = `
            <div id="security-modal" class="modal-overlay">
                <div class="modal-content">
                    <div class="modal-icon"><i class="fas fa-shield-alt"></i></div>
                    <h2 class="modal-title">CRITICAL SECURITY UPDATE</h2>
                    <p class="modal-text">A critical security update (<strong>${version}</strong>) is available for ModPanel.<br>Please update immediately to protect your server.</p>
                    <a href="https://modrinth.com/plugin/modpanel" target="_blank" class="btn" style="background-color: var(--error-color);">Download Update Now</a>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML("beforeend", modalHtml);
      }
    </script>
  </body>
</html>
