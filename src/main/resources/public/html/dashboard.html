<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModPanel - Dashboard</title>
    <link rel="stylesheet" href="../css/colors.css" />
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg: #08080f;
        --surface: #111118;
        --surface2: #181824;
        --border: #1e1e2e;
        --border-light: #2a2a3e;
        --accent: #10b981;
        --accent-dim: #059669;
        --accent-glow: rgba(16,185,129,0.2);
        --text: #e2e8f0;
        --text-dim: #6b7280;
        --text-muted: #4b5563;
        --danger: #ef4444;
        --warn: #f59e0b;
        --info: #3b82f6;
        --radius: 12px;
        --shadow: 0 4px 24px rgba(0,0,0,0.4);
      }
      html, body { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

      .topbar {
        height: 60px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.5rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .topbar-left { display: flex; align-items: center; gap: 1rem; }
      .topbar-logo {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dim));
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 1rem; color: #0a0a0f;
      }
      .topbar-title { color: var(--text); font-size: 1rem; font-weight: 700; }
      .topbar-right { display: flex; align-items: center; gap: 1rem; }
      .topbar-user { color: var(--text-dim); font-size: 0.85rem; }
      .btn-logout {
        background: transparent; border: 1px solid var(--border);
        color: var(--text-dim); padding: 0.4rem 0.9rem;
        border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        transition: all 0.2s;
      }
      .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

      .layout { display: flex; min-height: calc(100vh - 60px); }
      .sidebar {
        width: 210px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 1rem 0;
        flex-shrink: 0;
      }
      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        padding: 0.75rem 1.3rem;
        color: var(--text-dim);
        cursor: pointer;
        font-size: 0.85rem;
        border-left: 3px solid transparent;
        transition: all 0.2s;
        font-weight: 500;
      }
      .sidebar-item:hover {
        background: rgba(16,185,129,0.04);
        color: var(--text);
      }
      .sidebar-item.active {
        color: var(--accent);
        border-left-color: var(--accent);
        background: rgba(16,185,129,0.08);
      }
      .sidebar-icon {
        width: 20px; text-align: center;
        font-size: 1rem;
      }

      .main-content {
        flex: 1;
        padding: 1.5rem 2rem;
        overflow-y: auto;
      }
      .page-header {
        font-size: 1.3rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.2rem 1.4rem;
        transition: all 0.2s;
      }
      .stat-card:hover {
        border-color: var(--border-light);
        transform: translateY(-1px);
        box-shadow: var(--shadow);
      }
      .stat-label {
        color: var(--text-dim);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      .stat-value {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1.2;
      }
      .stat-value.warning { color: var(--warn); }
      .stat-value.danger { color: var(--danger); }
      .stat-sub {
        color: var(--text-muted);
        font-size: 0.75rem;
        margin-top: 0.3rem;
      }

      .section-title {
        font-size: 1rem;
        font-weight: 600;
        margin: 1.5rem 0 0.8rem;
        color: var(--text);
      }

      .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .table-wrap table { width: 100%; border-collapse: collapse; }
      .table-wrap th {
        text-align: left;
        padding: 0.75rem 1rem;
        background: rgba(255,255,255,0.02);
        color: var(--text-dim);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .table-wrap td {
        padding: 0.65rem 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }
      .table-wrap tr:last-child td { border-bottom: none; }
      .table-wrap tr { transition: background 0.15s; }
      .table-wrap tr:hover { background: rgba(255,255,255,0.02); }
      .table-wrap tr.clickable { cursor: pointer; }
      .table-wrap tr.clickable:hover { background: rgba(16,185,129,0.04); }

      .ping-badge {
        padding: 0.15rem 0.5rem;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .ping-good { background: rgba(16,185,129,0.12); color: var(--accent); }
      .ping-warn { background: rgba(245,158,11,0.12); color: var(--warn); }
      .ping-bad { background: rgba(239,68,68,0.12); color: var(--danger); }

      .btn {
        padding: 0.55rem 1rem;
        border: none;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-dim));
        color: #0a0a0f;
      }
      .btn-primary:hover {
        box-shadow: 0 4px 16px var(--accent-glow);
        transform: translateY(-1px);
      }
      .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }

      /* Users */
      .users-grid { display: grid; gap: 0.6rem; }
      .user-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: border-color 0.2s;
      }
      .user-card:hover { border-color: var(--border-light); }
      .user-info { display: flex; flex-direction: column; gap: 0.2rem; }
      .user-name { font-weight: 600; font-size: 0.9rem; }
      .user-meta { color: var(--text-dim); font-size: 0.75rem; }
      .user-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
      .badge {
        padding: 0.15rem 0.55rem; border-radius: 4px;
        font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      }
      .badge-admin { background: rgba(239,68,68,0.12); color: var(--danger); }
      .badge-mod { background: rgba(16,185,129,0.12); color: var(--accent); }
      .badge-disabled { background: rgba(107,114,128,0.12); color: var(--text-dim); }

      .refresh-info { color: var(--text-muted); font-size: 0.75rem; margin-top: 1rem; text-align: right; }

      /* Modal overlay */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 200;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
      }
      .modal-overlay.active { display: flex; }
      .modal-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem;
        width: 90%;
        max-width: 520px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 8px 48px rgba(0,0,0,0.6);
      }
      .modal-box h3 { margin: 0 0 1rem; color: var(--text); font-size: 1.1rem; }
      .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.2rem; }

      /* Player detail */
      .player-detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .detail-row {
        display: flex;
        justify-content: space-between;
        padding: 0.4rem 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.85rem;
      }
      .detail-label { color: var(--text-dim); }
      .detail-value { color: var(--text); font-weight: 500; }

      .inv-grid {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 2px;
        margin-bottom: 4px;
      }
      .inv-slot {
        aspect-ratio: 1;
        background: rgba(0,0,0,0.35);
        border: 1px solid var(--border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        min-height: 44px;
        max-width: 44px;
      }
      .inv-slot img {
        width: 28px;
        height: 28px;
        image-rendering: pixelated;
      }
      .inv-slot .item-count {
        position: absolute;
        bottom: 1px;
        right: 3px;
        font-size: 0.6rem;
        font-weight: 700;
        color: #fff;
        text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
      }
      .inv-slot .fa-fallback {
        font-size: 1rem;
        color: var(--text-dim);
      }
      .inv-row-label {
        font-size: 0.55rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0.4rem 0 0.2rem;
      }
      .armor-slots {
        display: flex;
        gap: 3px;
        margin-bottom: 0.5rem;
      }
      .armor-slots .inv-slot { width: 40px; height: 40px; }

      .sub-section { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); margin: 0.8rem 0 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }

      .effect-chip {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        background: rgba(59,130,246,0.1);
        border: 1px solid rgba(59,130,246,0.2);
        border-radius: 6px;
        font-size: 0.7rem;
        color: var(--info);
        margin: 0.2rem;
      }

      .empty-state {
        color: var(--text-dim);
        font-size: 0.85rem;
        padding: 1rem;
        text-align: center;
      }

      .back-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 0.4rem 0.8rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.2s;
        margin-bottom: 1rem;
      }
      .back-btn:hover { border-color: var(--accent); color: var(--accent); }

      .form-group { margin-bottom: 0.8rem; }
      .form-group label {
        display: block;
        color: var(--text-dim);
        font-size: 0.75rem;
        font-weight: 500;
        margin-bottom: 0.3rem;
      }
      .form-group input, .form-group select {
        width: 100%;
        padding: 0.55rem 0.8rem;
        background: #1a1a24;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 0.85rem;
        box-sizing: border-box;
      }
      .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .coords {
        font-family: 'Courier New', monospace;
        color: var(--accent);
        font-size: 0.85rem;
      }

      @media (max-width: 768px) {
        .sidebar { display: none; }
        .main-content { padding: 1rem; }
        .stats-grid { grid-template-columns: 1fr 1fr; }
        .player-detail-grid { grid-template-columns: 1fr; }
        .inv-grid { grid-template-columns: repeat(7, 1fr); }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">M</div>
        <div class="topbar-title">ModPanel</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-user" id="usernameDisplay"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-item active" data-page="dashboard">
          <i class="fas fa-chart-simple sidebar-icon"></i> Dashboard
        </div>
        <div class="sidebar-item" data-page="players">
          <i class="fas fa-users sidebar-icon"></i> Players
        </div>
        <div class="sidebar-item" data-page="users">
          <i class="fas fa-user-shield sidebar-icon"></i> Users
        </div>
        <div class="sidebar-item" data-page="whitelist">
          <i class="fas fa-shield-halved sidebar-icon"></i> IP Whitelist
        </div>
      </div>

      <div class="main-content" id="mainContent">
        <div id="page-dashboard"></div>
        <div id="page-players" style="display:none;"></div>
        <div id="page-users" style="display:none;"></div>
        <div id="page-whitelist" style="display:none;"></div>
        <div id="page-player-detail" style="display:none;"></div>
      </div>
    </div>

    <div class="modal-overlay" id="createUserModal">
      <div class="modal-box">
        <h3>Create User</h3>
        <div class="form-group">
          <label>Username</label>
          <input id="newUsername" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="newPassword" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="newRole">
            <option value="moderator">Moderator</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn" style="background:transparent;border:1px solid var(--border);color:var(--text-dim)" onclick="document.getElementById('createUserModal').classList.remove('active')">Cancel</button>
          <button class="btn btn-primary" onclick="createUser()">Create</button>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login'; }

      const username = localStorage.getItem('username');
      document.getElementById('usernameDisplay').textContent = username || 'Unknown';

      function authHeaders() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }

      async function apiFetch(url, options = {}) {
        const res = await fetch(url, { ...options, headers: { ...authHeaders(), ...options.headers } });
        if (res.status === 401) { localStorage.clear(); window.location.href = '/login'; }
        if (!res.ok && res.headers.get('content-type')?.includes('json')) {
          const err = await res.json();
          throw new Error(err.error || 'Request failed');
        }
        if (!res.ok) throw new Error('Request failed');
        return res;
      }

      function logout() { localStorage.clear(); window.location.href = '/login'; }

      let currentPage = 'dashboard';

      document.querySelectorAll('.sidebar-item').forEach(el => {
        el.addEventListener('click', function() {
          document.querySelectorAll('.sidebar-item').forEach(x => x.classList.remove('active'));
          this.classList.add('active');
          const page = this.dataset.page;
          document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display = 'none');
          document.getElementById('page-' + page).style.display = 'block';
          currentPage = page;
          loadPage(page);
        });
      });

      function showPlayerDetailPage(uuid, name) {
        document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display = 'none');
        document.getElementById('page-player-detail').style.display = 'block';
        document.querySelectorAll('.sidebar-item').forEach(x => x.classList.remove('active'));
        loadPlayerDetail(uuid, name);
      }

      async function loadPage(page) {
        switch (page) {
          case 'dashboard': await loadDashboard(); break;
          case 'players': await loadPlayersPage(); break;
          case 'users': await loadUsers(); break;
          case 'whitelist': await loadWhitelist(); break;
        }
      }

      let statsInterval, playersInterval;

      /* ========== DASHBOARD ========== */
      async function loadDashboard() {
        try {
          const res = await apiFetch('/api/stats');
          const d = await res.json();
          if (!d || typeof d.playerCount === 'undefined') {
            document.getElementById('page-dashboard').innerHTML = '<div class="page-header">Dashboard</div><div class="stat-card" style="color:var(--danger)">Failed to load stats</div>';
            return;
          }
          const tpsColor = d.tps < 15 ? 'danger' : d.tps < 18 ? 'warning' : '';
          const playerColor = d.playerCount >= d.maxPlayers ? 'danger' : '';

          document.getElementById('page-dashboard').innerHTML = `
            <div class="page-header">Dashboard</div>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">Players Online</div>
                <div class="stat-value ${playerColor}">${d.playerCount}<span style="font-size:1rem;color:var(--text-dim)">/${d.maxPlayers}</span></div>
                <div class="stat-sub">${d.serverName || 'Minecraft Server'}</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">TPS</div>
                <div class="stat-value ${tpsColor}">${d.tps.toFixed(1)}</div>
                <div class="stat-sub">Target: 20.0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Server</div>
                <div class="stat-value" style="font-size:1rem">${d.mcVersion ? d.mcVersion.substring(0, 20) + '...' : 'N/A'}</div>
                <div class="stat-sub">Version</div>
              </div>
            </div>
            <div class="section-title">Online Players</div>
            <div id="dashboard-players-list"></div>
            <div class="refresh-info" id="refreshInfo"></div>
          `;
          await loadPlayersList();
          if (statsInterval) clearInterval(statsInterval);
          statsInterval = setInterval(async () => {
            try {
              const r = await apiFetch('/api/stats');
              const s = await r.json();
              if (s && s.playerCount !== undefined) {
                const cards = document.querySelectorAll('.stat-value');
                if (cards[0]) cards[0].innerHTML = s.playerCount + '<span style="font-size:1rem;color:var(--text-dim)">/' + s.maxPlayers + '</span>';
                if (cards[1]) cards[1].textContent = s.tps.toFixed(1);
              }
            } catch(e) {}
          }, 5000);
        } catch (e) {
          document.getElementById('page-dashboard').innerHTML = '<div class="page-header">Dashboard</div><div class="stat-card" style="color:var(--danger)">Failed to load: ' + e.message + '</div>';
        }
      }

      async function loadPlayersList() {
        try {
          const res = await apiFetch('/api/players');
          const players = await res.json();
          if (!Array.isArray(players)) throw new Error('Invalid response');
          const list = document.getElementById('dashboard-players-list');
          if (!list) return;
          if (players.length === 0) {
            list.innerHTML = '<div class="empty-state">No players online</div>';
            document.getElementById('refreshInfo').textContent = '';
            return;
          }
          list.innerHTML = `<div class="table-wrap"><table><thead><tr>
            <th>Player</th><th>World</th><th>Health</th><th>Ping</th>
          </tr></thead><tbody>
            ${players.map(p => `<tr class="clickable" onclick="showPlayerDetailPage('${p.uuid}','${escapeHtml(p.name)}')">
              <td><span style="color:var(--accent);font-weight:600">${escapeHtml(p.displayName)}</span></td>
              <td style="color:var(--text-dim)">${p.world}</td>
              <td>${p.health}/${p.maxHealth}</td>
              <td><span class="ping-badge ${p.ping > 150 ? 'ping-bad' : p.ping > 80 ? 'ping-warn' : 'ping-good'}">${p.ping}ms</span></td>
            </tr>`).join('')}
          </tbody></table></div>`;
          document.getElementById('refreshInfo').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        } catch (e) {
          const list = document.getElementById('dashboard-players-list');
          if (list) list.innerHTML = '<div class="empty-state">Error loading players</div>';
        }
      }

      /* ========== PLAYERS PAGE ========== */
      async function loadPlayersPage() {
        try {
          const res = await apiFetch('/api/players');
          const players = await res.json();
          if (!Array.isArray(players)) throw new Error('Invalid response');

          let html = '<div class="page-header">Players</div>';
          if (players.length === 0) {
            html += '<div class="empty-state">No players online</div>';
          } else {
            html += `<div class="table-wrap"><table><thead><tr>
              <th>Player</th><th>World</th><th>Health</th><th>Ping</th><th>IP</th><th>Coords</th><th>Game Mode</th>
            </tr></thead><tbody>
              ${players.map(p => `<tr class="clickable" onclick="showPlayerDetailPage('${p.uuid}','${escapeHtml(p.name)}')">
                <td><span style="color:var(--accent);font-weight:600">${escapeHtml(p.displayName)}</span></td>
                <td style="color:var(--text-dim)">${p.world}</td>
                <td>${p.health}/${p.maxHealth}</td>
                <td><span class="ping-badge ${p.ping > 150 ? 'ping-bad' : p.ping > 80 ? 'ping-warn' : 'ping-good'}">${p.ping}ms</span></td>
                <td style="color:var(--text-dim);font-size:0.75rem;font-family:monospace">${p.ip}</td>
                <td class="coords">${p.x}, ${p.y}, ${p.z}</td>
                <td style="color:var(--text-dim)">${p.gamemode}</td>
              </tr>`).join('')}
            </tbody></table></div>`;
          }
          document.getElementById('page-players').innerHTML = html;
        } catch (e) {
          document.getElementById('page-players').innerHTML = '<div class="page-header">Players</div><div class="empty-state">Error loading players</div>';
        }
      }

      /* ========== PLAYER DETAIL ========== */
      let currentDetailUuid = null;

      async function loadPlayerDetail(uuid, name) {
        currentDetailUuid = uuid;
        const container = document.getElementById('page-player-detail');
        container.innerHTML = '<div class="page-header">Loading...</div>';

        try {
          const res = await apiFetch('/api/players/detail?uuid=' + uuid);
          const p = await res.json();
          if (!p || !p.name) throw new Error('Invalid response');

          const pingClass = p.ping > 150 ? 'ping-bad' : p.ping > 80 ? 'ping-warn' : 'ping-good';

          function itemSlotImg(type, count) {
            const imgName = type.toLowerCase() + '.png';
            const displayName = type.replace(/_/g, ' ').toLowerCase();
            const countHtml = count > 1 ? '<span class="item-count">' + count + '</span>' : '';
            return `<div class="inv-slot"><img src="/items/${imgName}" alt="${displayName}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><i class="fas fa-cube fa-fallback" style="display:none"></i>${countHtml}</div>`;
          }

          function emptySlot() {
            return '<div class="inv-slot"></div>';
          }

          // Find item at a given slot index
          function itemAt(slotIdx) {
            return p.inventory ? p.inventory.find(s => s.slot === slotIdx) : null;
          }

          // Main inventory: slots 9-35 (3 rows of 9)
          let invHtml = '<div class="sub-section">Inventory</div>';
          for (let row = 0; row < 3; row++) {
            invHtml += '<div class="inv-grid">';
            for (let col = 0; col < 9; col++) {
              const idx = 9 + row * 9 + col;
              const item = itemAt(idx);
              invHtml += item ? itemSlotImg(item.type, item.amount) : emptySlot();
            }
            invHtml += '</div>';
          }
          // Hotbar: slots 0-8 (1 row of 9)
          invHtml += '<div class="inv-row-label">Hotbar</div><div class="inv-grid">';
          for (let i = 0; i < 9; i++) {
            const item = itemAt(i);
            invHtml += item ? itemSlotImg(item.type, item.amount) : emptySlot();
          }
          invHtml += '</div>';

          function armorSlotImg(type) {
            const imgName = type.toLowerCase() + '.png';
            const displayName = type.replace(/_/g, ' ').toLowerCase();
            return `<div class="inv-slot"><img src="/items/${imgName}" alt="${displayName}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><i class="fas fa-cube fa-fallback" style="display:none"></i></div>`;
          }

          let armorHtml = '';
          if (p.armor && p.armor.length > 0) {
            armorHtml += '<div class="sub-section">Armor</div><div class="armor-slots">';
            p.armor.forEach(a => {
              armorHtml += armorSlotImg(a.type);
            });
            armorHtml += '</div>';
          }

          let offhandHtml = '';
          if (p.offhand) {
            offhandHtml += '<div class="sub-section">Offhand</div><div class="armor-slots">';
            offhandHtml += armorSlotImg(p.offhand);
            offhandHtml += '</div>';
          }

          let effectsHtml = '';
          if (p.potionEffects && p.potionEffects.length > 0) {
            effectsHtml += '<div class="sub-section">Effects</div>';
            p.potionEffects.forEach(e => {
              effectsHtml += `<span class="effect-chip">${e.type} ${e.amplifier + 1} (${e.duration}s)</span>`;
            });
          }

          container.innerHTML = `
            <button class="back-btn" onclick="backToPlayers()">&larr; Back to Players</button>
            <div class="page-header">${escapeHtml(p.displayName)}</div>
            <div class="stats-grid" style="grid-template-columns:1fr 1fr">
              <div class="stat-card">
                <div class="player-detail-grid">
                  <div class="detail-row"><span class="detail-label">UUID</span><span class="detail-value" style="font-size:0.7rem;font-family:monospace">${p.uuid}</span></div>
                  <div class="detail-row"><span class="detail-label">IP</span><span class="detail-value" style="font-family:monospace">${p.ip}</span></div>
                  <div class="detail-row"><span class="detail-label">World</span><span class="detail-value">${p.world}</span></div>
                  <div class="detail-row"><span class="detail-label">Coords</span><span class="detail-value coords">${Math.round(p.x)}, ${Math.round(p.y)}, ${Math.round(p.z)}</span></div>
                  <div class="detail-row"><span class="detail-label">Health</span><span class="detail-value">${p.health} / ${p.maxHealth}</span></div>
                  <div class="detail-row"><span class="detail-label">Food</span><span class="detail-value">${p.food} / 20</span></div>
                  <div class="detail-row"><span class="detail-label">Ping</span><span class="detail-value"><span class="ping-badge ${pingClass}">${p.ping}ms</span></span></div>
                  <div class="detail-row"><span class="detail-label">Game Mode</span><span class="detail-value">${p.gamemode}</span></div>
                  <div class="detail-row"><span class="detail-label">Level</span><span class="detail-value">${p.level}</span></div>
                  <div class="detail-row"><span class="detail-label">Locale</span><span class="detail-value">${p.locale}</span></div>
                </div>
              </div>
              <div class="stat-card">
                ${armorHtml}
                ${offhandHtml}
                ${effectsHtml || '<div style="color:var(--text-dim);font-size:0.8rem;margin-top:0.5rem">No active effects</div>'}
              </div>
            </div>
            ${invHtml}
          `;
        } catch (e) {
          container.innerHTML = `
            <button class="back-btn" onclick="backToPlayers()">&larr; Back to Players</button>
            <div class="page-header">Error</div>
            <div class="empty-state">Failed to load player detail: ${e.message}</div>
          `;
        }
      }

      function backToPlayers() {
        document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display = 'none');
        document.getElementById('page-players').style.display = 'block';
        document.querySelectorAll('.sidebar-item').forEach(x => x.classList.remove('active'));
        document.querySelector('.sidebar-item[data-page="players"]').classList.add('active');
        loadPage('players');
      }

      /* ========== USERS ========== */
      async function loadUsers() {
        try {
          const res = await apiFetch('/api/users');
          const users = await res.json();
          if (!Array.isArray(users)) throw new Error('Invalid users data');

          document.getElementById('page-users').innerHTML = `
            <div class="page-header" style="justify-content:space-between">
              <span>Users</span>
              <button class="btn btn-primary btn-sm" onclick="document.getElementById('createUserModal').classList.add('active')">+ Add User</button>
            </div>
            <div class="users-grid">
              ${users.map(u => `<div class="user-card">
                <div class="user-info">
                  <div class="user-name">${escapeHtml(u.username)}</div>
                  <div class="user-meta">Role: ${u.role} | Created: ${u.createdAt ? u.createdAt.split('T')[0] : 'N/A'} | Last login: ${u.lastLogin ? u.lastLogin.split('T')[0] : 'Never'}</div>
                </div>
                <div class="user-badges">
                  ${u.role === 'admin' || u.role === 'owner' ? '<span class="badge badge-admin">admin</span>' : '<span class="badge badge-mod">mod</span>'}
                  ${!u.enabled ? '<span class="badge badge-disabled">disabled</span>' : ''}
                </div>
              </div>`).join('')}
            </div>
          `;
        } catch (e) {
          document.getElementById('page-users').innerHTML = '<div class="page-header">Users</div><div class="empty-state">Error loading users</div>';
        }
      }

      async function createUser() {
        const username = document.getElementById('newUsername').value;
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;
        if (!username || !password) return alert('Fill all fields');
        const res = await apiFetch('/api/users/create', {
          method: 'POST',
          body: JSON.stringify({ username, password, role })
        });
        if (res.ok) {
          document.getElementById('createUserModal').classList.remove('active');
          document.getElementById('newUsername').value = '';
          document.getElementById('newPassword').value = '';
          loadUsers();
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to create user');
        }
      }

      /* ========== WHITELIST ========== */
      async function loadWhitelist() {
        try {
          const res = await apiFetch('/api/whitelist');
          let entries = await res.json();
          if (!Array.isArray(entries)) entries = [];

          document.getElementById('page-whitelist').innerHTML = `
            <div class="page-header">IP Whitelist</div>
            <div class="table-wrap">
              <table>
                <thead><tr><th>IP Address</th><th>Added At</th></tr></thead>
                <tbody>
                  ${entries.length === 0 ? '<tr><td colspan="2" style="color:var(--text-dim);text-align:center;padding:1rem">No entries</td></tr>' :
                    entries.map(e => `<tr><td style="font-family:monospace">${e.ip}</td><td style="color:var(--text-dim)">${e.addedAt || 'N/A'}</td></tr>`).join('')}
                </tbody>
              </table>
            </div>
          `;
        } catch (e) {
          document.getElementById('page-whitelist').innerHTML = '<div class="page-header">IP Whitelist</div><div class="empty-state">Error loading whitelist</div>';
        }
      }

      /* ========== UTILITY ========== */
      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      window.onload = () => loadDashboard();
      window.onbeforeunload = () => { if (statsInterval) clearInterval(statsInterval); if (playersInterval) clearInterval(playersInterval); };
    </script>
  </body>
</html>
