# ModPanel Configuration File

# Web server configuration
web-server:
  port: 9999
  proxy-mode: false
  ip-privacy: true
  connection-limit:
    enabled: true
    ban-after: 10
    ban-duration: 600
    permanent-ban-threshold: 2

# Storage configuration
# Supported types: h2 (default), mysql, mariadb
storage:
  type: h2
  mysql:
    host: 127.0.0.1
    port: 3306
    database: modpanel
    username: root
    password: ""
    use-ssl: false

# Discord bot (set token to "none" to disable)
discord_token: "none"
