# ModPanel Configuration File

# Web server configuration
web-server:
  port: 9999 # Port for the web server default is 9999
  ip-privacy: true # If true, only the first two digits of the IP address will be showed on logs (e.g. 192.168.x.x)

# Discord bot configuration
discord_token: "none" # Your Discord bot token here (default is "none" which disables the bot)
